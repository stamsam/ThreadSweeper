<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ThreadSweeper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <h1>ThreadSweeper</h1>

    <label class="row">
      <input id="dryRun" type="checkbox" checked>
      <span>Dry run (preview only)</span>
    </label>

    <label class="row">
      <input id="onlyYourChats" type="checkbox" checked>
      <span>Restrict to Your chats</span>
    </label>

    <label class="row">
      <input id="confirmBeforeRun" type="checkbox" checked>
      <span>Show browser confirm prompt</span>
    </label>

    <label class="field" for="maxDeletes">
      <span>Max deletes</span>
      <input id="maxDeletes" type="number" min="1" value="50">
    </label>

    <label class="field" for="delayMs">
      <span>Delay (ms)</span>
      <input id="delayMs" type="number" min="200" value="900">
    </label>

    <div class="actions">
      <button id="start" class="primary" type="button">Start</button>
      <button id="stop" type="button">Stop</button>
      <button id="refresh" type="button">Refresh</button>
    </div>

    <p id="status">Idle</p>
    <div id="tips">Open chatgpt.com in a tab first.</div>
    <pre id="logs" aria-live="polite"></pre>
  </main>

  <script src="popup.js"></script>
</body>
</html>
